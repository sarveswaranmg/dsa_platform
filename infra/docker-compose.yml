name: dsa-platform

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsa}
      POSTGRES_DB: ${POSTGRES_DB:-exam}
    ports:
      # Host port 5433: 5432 is commonly taken by a local Postgres install.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  exam:
    build: ../services/exam
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa}@postgres:5432/${POSTGRES_DB:-exam}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me-not-for-production-use}
      QUESTION_SERVICE_URL: http://question:8000
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8001:8000"
    volumes:
      - ../services/exam/app:/service/app
      - ../services/exam/alembic:/service/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  question:
    build: ../services/question
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa}@postgres:5432/question
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me-not-for-production-use}
      S3_ENDPOINT_URL: http://localstack:4566
      S3_PRESIGN_ENDPOINT_URL: http://localhost:4566
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8002:8000"
    volumes:
      - ../services/question/app:/service/app
      - ../services/question/alembic:/service/alembic
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres-data:
