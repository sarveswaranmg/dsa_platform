services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsa}
      POSTGRES_DB: ${POSTGRES_DB:-exam}
    ports:
      # Host port 5433: 5432 is commonly taken by a local Postgres install.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot migration task: runs `alembic upgrade head` to completion, then
  # exits. `exam` depends on this completing successfully before it starts,
  # so migrations never race across replicas/restarts. In prod (Terraform)
  # this becomes a one-off ECS task using the same image.
  exam-migrate:
    build: ../services/exam
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa}@postgres:5432/${POSTGRES_DB:-exam}
      RS256_PRIVATE_KEY: *rs256-private-key
    command: ["./migrate.sh"]
    volumes:
      - ../services/exam/app:/service/app
      - ../services/exam/alembic:/service/alembic
    depends_on:
      postgres:
        condition: service_healthy

  exam:
    build: ../services/exam
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa}@postgres:5432/${POSTGRES_DB:-exam}
      REDIS_URL: redis://redis:6379/0
      # Dev keypair, committed at infra/dev-keys/ (see infra/dev-keys/README.md).
      # Exam is the only service that signs; gateway/question get the public
      # key only (below).
      RS256_PRIVATE_KEY: *rs256-private-key
      QUESTION_SERVICE_URL: http://question:8000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dev-google-client-id.apps.googleusercontent.com}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      SQS_ENDPOINT_URL: http://localstack:4566
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # No host port: reachable only through the gateway (keeps the
    # unauthenticated internal endpoints off the host).
    expose:
      - "8000"
    volumes:
      - ../services/exam/app:/service/app
      - ../services/exam/alembic:/service/alembic
    depends_on:
      exam-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # One-shot migration task — see exam-migrate above for the rationale.
  question-migrate:
    build: ../services/question
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa}@postgres:5432/question
      RS256_PUBLIC_KEY: *rs256-public-key
    command: ["./migrate.sh"]
    volumes:
      - ../services/question/app:/service/app
      - ../services/question/alembic:/service/alembic
    depends_on:
      postgres:
        condition: service_healthy

  question:
    build: ../services/question
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dsa}:${POSTGRES_PASSWORD:-dsa}@postgres:5432/question
      # Dev keypair, committed at infra/dev-keys/ (see infra/dev-keys/README.md).
      # Verify-only: question never signs, so it gets the public key only.
      RS256_PUBLIC_KEY: *rs256-public-key
      S3_ENDPOINT_URL: http://localstack:4566
      S3_PRESIGN_ENDPOINT_URL: http://localhost:4566
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # No host port: the unauthenticated /internal endpoints are reachable only
    # on the compose network, never from the host.
    expose:
      - "8000"
    volumes:
      - ../services/question/app:/service/app
      - ../services/question/alembic:/service/alembic
    depends_on:
      question-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # Judge worker: consumes submission jobs and launches sibling runner
  # containers via the mounted Docker socket (DooD). It runs untrusted code
  # only inside those locked-down siblings, never in this container.
  #
  # NOTE (Docker Desktop / macOS): sibling bind-mounts resolve on the Docker
  # VM, so the scratch dir must be a path the VM shares. On a Linux host the
  # bind below works as-is. For local dev on macOS, run the worker on the host
  # instead:  cd services/judge && uv run python -m app.worker
  judge:
    build: ../services/judge
    environment:
      SQS_ENDPOINT_URL: http://localstack:4566
      S3_ENDPOINT_URL: http://localstack:4566
      SCRATCH_ROOT: /tmp/dsa-judge
      # "runc" (default) or "gvisor" — see docs/DECISIONS.md. Left at the
      # default here: gVisor isn't installed in the Docker Desktop VM.
      JUDGE_RUNTIME: ${JUDGE_RUNTIME:-runc}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/dsa-judge:/tmp/dsa-judge
    depends_on:
      localstack:
        condition: service_healthy

  # Edge gateway: the only published entry point for the two API services.
  gateway:
    build: ../services/gateway
    environment:
      EXAM_SERVICE_URL: http://exam:8000
      QUESTION_SERVICE_URL: http://question:8000
      # Dev keypair, committed at infra/dev-keys/ (see infra/dev-keys/README.md).
      # Verify-only: gateway never signs, so it gets the public key only.
      RS256_PUBLIC_KEY: *rs256-public-key
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:5173"]'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8080:8000"
    volumes:
      - ../services/gateway/app:/service/app
    depends_on:
      redis:
        condition: service_healthy
      exam:
        condition: service_started
      question:
        condition: service_started

  # Candidate exam UI (Vite dev server). Talks only to the gateway.
  frontend:
    image: node:20-slim
    working_dir: /app
    environment:
      VITE_API_TARGET: http://gateway:8000
      VITE_QUESTION_TARGET: http://gateway:8000
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - gateway

volumes:
  postgres-data:
