[project]
name = "exam-service"
version = "0.1.0"
description = "Exam service: orgs, examiners, blueprints, invites, sessions, results"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic-settings>=2.3",
    "pydantic[email]>=2.7",
    "argon2-cffi>=23.1",
    "pyotp>=2.9",
    "pyjwt>=2.9",
    "cryptography>=42",
    "uuid6>=2024.1.12",
    "httpx>=0.27",
    "redis>=5",
    "joserfc>=1.0",
    "boto3>=1.34",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.6",
    "mypy>=1.11",
    "boto3-stubs[sqs]>=1.34",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
# Autogenerated migrations: unused sa/op imports, long lines, import order.
"alembic/versions/*" = ["F401", "E501", "I001"]
# RS256 dev-key env var must be set before any `app.*` import runs.
"tests/conftest.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
strict = true
